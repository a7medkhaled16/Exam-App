<div class="flex-1 p-6 bg-gray-50 overflow-y-auto ">

  <!-- Header -->
  <div class="flex items-center gap-2 text-xs text-gray-400 mb-4">
    <span class="cursor-pointer hover:text-blue-600" routerLink="/main" >Diplomas</span>
    <span>/</span>
    <span class="text-gray-600 font-medium">{{diplomaName}} </span>
    <span>/</span>
    <span class="text-blue-600 font-medium">Exams</span>
  </div>


  <div class="flex">

    <div class="mr-2 cursor-pointer" routerLink="/main">
<svg width="35" height="70" viewBox="0 0 38 77" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect x="0.5" y="0.5" width="37" height="76" fill="white"/>
<rect x="0.5" y="0.5" width="37" height="76" stroke="#155DFC"/>
<path d="M22 44.5L16 38.5L22 32.5" stroke="#155DFC" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

    </div>
     <div class="flex items-center justify-between bg-blue-600 text-white px-5 py-3  mb-6 w-[96%]">
    <div class="flex items-center gap-2">
    <svg width="45" height="45" viewBox="0 0 45 45" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M22.5 39.375V13.125M22.5 39.375C22.5 37.8832 21.9074 36.4524 20.8525 35.3975C19.7976 34.3426 18.3668 33.75 16.875 33.75H5.625C5.12772 33.75 4.65081 33.5525 4.29917 33.2008C3.94754 32.8492 3.75 32.3723 3.75 31.875V7.5C3.75 7.00272 3.94754 6.52581 4.29917 6.17417C4.65081 5.82254 5.12772 5.625 5.625 5.625H15C16.9891 5.625 18.8968 6.41518 20.3033 7.8217C21.7098 9.22822 22.5 11.1359 22.5 13.125M22.5 39.375C22.5 37.8832 23.0926 36.4524 24.1475 35.3975C25.2024 34.3426 26.6332 33.75 28.125 33.75H39.375C39.8723 33.75 40.3492 33.5525 40.7008 33.2008C41.0525 32.8492 41.25 32.3723 41.25 31.875V29.4375M22.5 13.125C22.5 11.1359 23.2902 9.22822 24.6967 7.8217C26.1032 6.41518 28.0109 5.625 30 5.625H39.375C39.8723 5.625 40.3492 5.82254 40.7008 6.17417C41.0525 6.52581 41.25 7.00272 41.25 7.5V11.25M30 22.5L33.75 26.25L41.25 18.75" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
      <h2 class="text-2xl font-semibold ">{{diplomaName}} Exams </h2>
    </div>

  
  </div>
  </div>


@for (exam of allExams; track exam.id) {
<div class="flex  gap-4 bg-blue-50 p-4  my-3 font relative group ">

  <!-- Icon -->
  <div class="w-20 h-20  border border-blue-200 bg-blue-100 flex items-center justify-center ">
    <img [src]="exam.image" class="w-10 h-10" />
  </div>

  <!-- Content -->
  <div class="flex-1 min-w-0">

    <!-- Title + Meta -->
    <div class="flex items-center justify-between gap-4 flex-wrap mb-1">
      <h3 class="text-blue-600 font-bold text-sm">{{exam.title}}</h3>
      <div class="flex items-center gap-4 text-xs text-gray-500 shrink-0">
        <span class="flex items-center gap-1">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_41826_308)">
<path d="M6.8175 6.75C6.99383 6.24875 7.34186 5.82608 7.79997 5.55685C8.25807 5.28762 8.79667 5.1892 9.32038 5.27903C9.84409 5.36886 10.3191 5.64114 10.6613 6.04765C11.0035 6.45415 11.1908 6.96864 11.19 7.5C11.19 9 8.94 9.75 8.94 9.75M9 12.75H9.0075M16.5 9C16.5 13.1421 13.1421 16.5 9 16.5C4.85786 16.5 1.5 13.1421 1.5 9C1.5 4.85786 4.85786 1.5 9 1.5C13.1421 1.5 16.5 4.85786 16.5 9Z" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<defs>
<clipPath id="clip0_41826_308">
<rect width="18" height="18" fill="white"/>
</clipPath>
</defs>
</svg>
 {{exam.questionsCount}} Questions
        </span>
        <span class="flex items-center gap-1">
         <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M7.5 1.5H10.5M9 10.5L11.25 8.25M15 10.5C15 13.8137 12.3137 16.5 9 16.5C5.68629 16.5 3 13.8137 3 10.5C3 7.18629 5.68629 4.5 9 4.5C12.3137 4.5 15 7.18629 15 10.5Z" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
 {{exam.duration}} minutes
        </span>
      </div>
    </div>

    <!-- Description -->
   <div>
     <p class="text-xs text-gray-600 leading-relaxed">
      {{exam.description}}
    </p>
   </div>  

 <button 
 [routerLink]="['/main/questions', exam.id]"
 [state]="{examName: exam.title}"
  class=" flex align-center
    absolute bottom-1 right-3
    bg-blue-600 text-white my-3 px-5 py-1
    opacity-0 group-hover:opacity-100
    translate-y-2 group-hover:translate-y-0
    transition-all duration-200
    hover:bg-blue-700
  ">START <div class="ml-2 mt-1">
     <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M13.5 6L16.5 9M16.5 9L13.5 12M16.5 9H1.5" stroke="white" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
 </div>
</button>
  </div>

</div>
}
  
   









  

  <p class="text-center text-sm text-gray-400 mt-6 font">End of list</p>
</div>
