<div class="flex-1 p-6 bg-gray-50 overflow-y-auto">
  <div class="flex items-center gap-2 text-xs text-gray-400 mb-2">
    <span class="cursor-pointer hover:text-blue-600">Diplomas</span>
  </div>
  <!-- Header -->
  <div class="flex items-center justify-between bg-blue-600 text-white px-5 py-3  mb-6">
    <div class="flex items-center gap-2 font-semibold text-2xl">
      <svg width="35" height="35" viewBox="0 0 45 45" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M41.25 18.7502V30.0002M11.25 23.4377V30.0002C11.25 31.492 12.4353 32.9228 14.5451 33.9777C16.6548 35.0326 19.5163 35.6252 22.5 35.6252C25.4837 35.6252 28.3452 35.0326 30.455 33.9777C32.5647 32.9228 33.75 31.492 33.75 30.0002V23.4377M40.1625 20.4789C40.4982 20.3309 40.783 20.0876 40.9818 19.7792C41.1805 19.4708 41.2844 19.1109 41.2806 18.7441C41.2768 18.3772 41.1655 18.0195 40.9604 17.7153C40.7553 17.4111 40.4655 17.1738 40.1269 17.0327L24.0563 9.71268C23.5677 9.48983 23.037 9.37451 22.5 9.37451C21.963 9.37451 21.4323 9.48983 20.9438 9.71268L4.875 17.0252C4.54119 17.1714 4.25722 17.4117 4.05781 17.7167C3.85841 18.0217 3.75221 18.3783 3.75221 18.7427C3.75221 19.1071 3.85841 19.4636 4.05781 19.7687C4.25722 20.0737 4.54119 20.314 4.875 20.4602L20.9438 27.7877C21.4323 28.0105 21.963 28.1259 22.5 28.1259C23.037 28.1259 23.5677 28.0105 24.0563 27.7877L40.1625 20.4789Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

      Diplomas
    </div>
  </div>

  <!-- Grid -->
  <div class="grid grid-cols-3 gap-4 font">
    @for (item of allDimplomas; track item.id) {
<div  [routerLink]="['/main/exams', item.id]" [state]="{dimplomaName: item.title}" class="relative w-91 h-112 overflow-hidden cursor-pointer ">
  
  <!-- Background Image -->
  <img 
    [src]="item.image" 
    alt="Flutter Development"
    class="w-full h-full object-cover"
  />

  <!-- Dark overlay at bottom -->
  <div class="absolute"></div>

  <!-- Bottom Text -->
  <div class="absolute bottom-2 left-2 right-2 bg-blue-600 px-4 py-3 opacity-80">
    <h3 class="text-white font-bold text-sm">{{item.title}}</h3>
    <p class="text-blue-100 text-xs mt-0.5 line-clamp-2">
      {{item.description}}
    </p>
  </div>

</div>
    }
   

  </div>

  <!-- Scroll more -->
  <p class="text-center text-sm text-gray-400 mt-6 cursor-pointer hover:text-blue-600 font">Scroll to view more</p>

</div>
