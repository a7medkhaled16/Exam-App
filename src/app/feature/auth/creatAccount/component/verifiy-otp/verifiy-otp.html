<div class="flex h-full w-full items-center justify-center bg-white px-8 py-16">
  <div class="w-full max-w-sm">

    

    <!-- creation line -->
    <div class="flex items-center w-full mb-3">
  
  <!-- Step 1 - Completed (filled) -->
  <div class="w-3 h-3 rotate-45 bg-blue-600"></div>
  
  <!-- Line - solid -->
  <div class="flex-1 h-[2px] bg-blue-600 mx-2"></div>

  <!-- Step 2 - Completed (filled) -->
  <div class="w-5 h-5 rotate-45 bg-blue-200 flex items-center justify-center">
    <div class="w-3 h-3 bg-blue-600 "></div>
  </div>

  <!-- Line - dashed -->
  <div class="flex-1 border-t-2 border-dashed border-blue-300 mx-2"></div>

  <!-- Step 3 - Current (outlined) -->
  <div class="w-3 h-3 rotate-45 border-2 border-blue-600 bg-white"></div>

  <!-- Line - dashed -->
  <div class="flex-1 border-t-2 border-dashed border-blue-300 mx-2"></div>

  <!-- Step 4 - Upcoming (outlined grey) -->
  <div class="w-3 h-3 rotate-45 border-2 border-blue-600 bg-white"></div>

</div>

    <!-- Heading -->
    <h2 class="my-4 text-3xl font-bold text-gray-900">Cerat Account</h2>
    <h2 class="my-4 text-3xl font-bold text-main">Verifi OTP</h2>
    <p class="text-sm text-gray-500 mb-5 font">Please enter the 6-digits code we have sent to:
user@example.com. <a routerLink="/auth/register" class="font-medium text-blue-600 hover:underline hover:cursor-pointer">
        Edit
      </a></p>
<form action="" [formGroup]="Otpform" (ngSubmit)="confirmotp()">
  

      <!-- Username field -->
      <div class="flex flex-col gap-1.5 mb-6 font">

        <p-inputOtp
        formControlName="otp"
  [length]="6"
  styleClass="border"
/>
@if(send){
        <p class="mt-6 text-center text-sm text-gray-500">You can request another code in: 60s</p>
}@else{
    <p class="mt-6 text-center text-sm text-gray-500">
      Didn’t receive the code? 
      <a (click)="sendVerify()" class="font-medium text-blue-600 hover:underline hover:cursor-pointer">
        Resend
      </a>
    </p>
}

       <app-errorbanner [errorMessage]="errorMessage()"/>  

      </div>
  
      <!-- Submit button -->
     <button class="register-btn font" 
      [disabled]="Otpform.invalid"
            type="submit" >
           Verify Code
          </button>
</form>


   

  </div>
</div>
