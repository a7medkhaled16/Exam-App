<div class="flex h-full w-full flex-column items-center justify-center bg-white px-8 py-16">
  <div class="w-full max-w-sm">

    

    <!-- Heading -->
    <h2 class="mb-8 text-3xl font-bold text-gray-900">Login</h2>

    <!-- Form -->
    <form [formGroup]="loginform" (ngSubmit)="login()" class="flex flex-col gap-5">

      <!-- Username field -->
      <div class="flex flex-col gap-1.5">
        <label for="username" class="text-sm font-medium text-gray-700">
          Username
        </label>
        <input
        formControlName="username"
          id="username"
          name="username"
          type="text"
          placeholder="user123"
          class="main-input"/>

         <app-validation [controls]="loginform.get('username')"/>


         
      </div>
      <!-- Password field -->
      <div class="flex flex-col gap-1.5">
        <label for="password" class="text-sm font-medium text-gray-700">
          Password
        </label>

        <div class="relative">
          
         

           <div class="" dir="ltr">
           

               <p-password
          formControlName="password"
          [toggleMask]="true"
          [feedback]="false"
          placeholder="••••••••"
          styleClass="w-full"
          inputStyleClass="main-input w-full"
        />
         <app-validation [controls]="loginform.get('password')"/>
             
              
        </div>
          
        </div>

        <!-- Forgot password -->
        <div class="flex justify-end">  <a routerLink="/auth/forgetpassword"
            class="text-xs text-blue-600 hover:underline hover:cursor-pointer"
          > Forgot your password?</a>  
           
         
        </div>
      </div>

   @if (errorMessage()) {
  <div class="relative border border-red-600 bg-red-50  px-4 py-3 text-center">
    
    <!-- Circle X icon on top -->
    <div class="absolute -top-2 left-1/2 -translate-x-1/2 bg-white rounded-full">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-red-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>

    <!-- Message text -->
    <p class="text-red-600 text-sm font-medium">{{errorMessage()}} </p>

  </div>
}

      <!-- Submit button -->
     <button class="main-btn"
            >
           Login
          </button>

    </form>

    <!-- Sign-up link -->
    <p class="mt-6 text-center text-sm text-gray-500">
      Don't have an account?
      <a routerLink="/auth/register" class="font-medium text-blue-600 hover:underline hover:cursor-pointer">
        Create yours
      </a>
    </p>

  </div>
</div>
