<div class="flex h-full w-full items-center justify-center bg-white px-8 py-16">
  <div class="w-full max-w-sm">

    
    
    

    <!-- Heading -->
    <h2 class="mb-4 text-3xl font-bold text-gray-900">Creat Account</h2>

    <!-- Form -->
    <form  [formGroup]="emailform" (ngSubmit)="sendVerify()" class="flex flex-col gap-5 font ">

       
      <!-- Username field -->
      <div class="flex flex-col gap-1.5">
        <label for="username" class="text-sm font-medium text-gray-700">
          email
        </label>
        <input 
        formControlName="email"
          id="email"
          name="email"
          type="text"
          placeholder="use@example.com"
          class="main-input" />
          <app-validation [controls]="emailform.get('email')"/>
      </div>

        @if (errorMessage()) {
  <div class="relative border border-red-600 bg-red-50  px-4 py-3 text-center">
    
    <!-- Circle X icon on top -->
    <div class="absolute -top-2 left-1/2 -translate-x-1/2 bg-white rounded-full">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-red-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>

    <!-- Message text -->
    <p class="text-red-600 text-sm font-medium">{{errorMessage() }} </p>

  </div>
}
      

      <!-- Submit button -->
     <button class="bg-blue-200 text-black rounded border border-blue-700 my-3 px-5 py-2 w-full hover:bg-blue-300 cursor-pointer flex justify-center " 
     [disabled]="emailform.invalid"
     [class.bg-gray-300]="emailform.invalid"
     [class.border-gray-300]="emailform.invalid"
            type="submit" >
           next <div class="p-1">
            <svg xmlns="http://www.w3.org/2000/svg" 
       width="16" 
       height="16" 
       viewBox="0 0 24 24" 
       fill="none" 
       stroke="currentColor" 
       stroke-width="2" 
       stroke-linecap="round" 
       stroke-linejoin="round">
    <line x1="5" y1="12" x2="19" y2="12"></line>
    <polyline points="12 5 19 12 12 19"></polyline>
  </svg>
           </div>

          </button>

    </form>

    <!-- Sign-up link -->
    <p class="mt-4 text-center text-sm text-gray-500 font">
      Already have an account?
      <a class="font-medium text-blue-600 hover:underline hover:cursor-pointer">
        Login
      </a>
    </p>

  </div>
</div>
