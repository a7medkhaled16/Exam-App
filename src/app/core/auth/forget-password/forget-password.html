<div class="flex h-full w-full flex-column items-center justify-center bg-white px-8 py-16">
  <div class="w-full max-w-sm">

    

   <!-- Heading -->
    <h2 class="mb-8 text-3xl font-bold text-gray-900">Forget Password</h2>
    <p class="text-sm text-gray-500 mb-5 font">Don’t worry, we will help you recover your account.</p>

    <!-- Form -->
    <form [formGroup]="forgetform" (ngSubmit)="forgetpassword()"  class="flex flex-col gap-5">

      <!-- Username field -->
      <div class="flex flex-col gap-1.5">
        <label for="email" class="text-sm font-medium text-gray-700">
          Username
        </label>
        <input
        formControlName="email"
          id="email"
          name="email"
          type="email"
          placeholder="user@example.com"
          class="main-input"
        />
        <app-validation [controls]="forgetform.get('email')"/>
      </div>

        @if (errorMessage()) {
  <div class="relative border border-red-600 bg-red-50  px-4 py-3 text-center">
    
    <!-- Circle X icon on top -->
    <div class="absolute -top-2 left-1/2 -translate-x-1/2 bg-white rounded-full">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-red-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>

    <!-- Message text -->
    <p class="text-red-600 text-sm font-medium">{{errorMessage()}} </p>

  </div>
}
      

  <!-- Submit button -->
     <button class="main-btn flex justify-center" type="submit"
     [disabled]="forgetform.invalid"
     [class.bg-gray-500]="forgetform.invalid"
             >
           Continuo <div class="my-1 mx-2">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M13.5 6L16.5 9M16.5 9L13.5 12M16.5 9H1.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
           </div>

          </button>

    </form>

    <!-- Sign-up link -->
    <p class="mt-6 text-center text-sm text-gray-500">
      Don't have an account?
      <a routerLink="/auth/register" class="font-medium text-blue-600 hover:underline hover:cursor-pointer">
        Create yours
      </a>
    </p>

  </div>
</div>
